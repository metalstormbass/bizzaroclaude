name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Block PR if draft
  check-draft:
    name: Check Draft Status
    runs-on: ubuntu-latest
    steps:
      - name: Block if draft
        if: github.event.pull_request.draft == true
        run: |
          echo "This PR is marked as draft. Please mark it as ready for review."
          exit 1

  # Check for common issues
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Check for merge conflicts
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions"
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Checking for merge conflicts..."
            git merge origin/main --no-commit --no-ff || {
              echo "⚠️ This PR has merge conflicts with main branch"
              echo "Please resolve conflicts before merging"
              git merge --abort
              exit 1
            }
            git merge --abort
          fi

      - name: Check for large files
        run: |
          echo "Checking for large files (>1MB)..."
          large_files=$(find . -type f -size +1M -not -path "./.git/*" -not -path "./vendor/*" || true)
          if [ -n "$large_files" ]; then
            echo "⚠️ Large files detected:"
            echo "$large_files"
            echo "Please consider if these files should be tracked in git"
          fi

      - name: Check for debugging code
        run: |
          echo "Checking for debugging statements..."
          debug_patterns="fmt.Println\|log.Println\|TODO\|FIXME\|XXX"
          if git diff origin/main...HEAD | grep -E "$debug_patterns"; then
            echo "⚠️ Potential debugging code found in diff"
            echo "Please review before merging"
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "❌ go.mod or go.sum is not tidy"
            echo "Run 'go mod tidy' and commit the changes"
            exit 1
          fi

  # Check PR size
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          git fetch origin main
          changes=$(git diff --stat origin/main...HEAD | tail -1)
          echo "PR changes: $changes"

          # Extract number of files and lines changed
          files=$(echo "$changes" | awk '{print $1}')
          insertions=$(echo "$changes" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          deletions=$(echo "$changes" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)

          total_changes=$((insertions + deletions))

          echo "Files changed: $files"
          echo "Total changes: $total_changes lines"

          if [ "$total_changes" -gt 1000 ]; then
            echo "⚠️ This PR is quite large ($total_changes lines changed)"
            echo "Consider breaking it into smaller PRs for easier review"
          elif [ "$total_changes" -gt 500 ]; then
            echo "ℹ️ This PR is moderately sized ($total_changes lines changed)"
          else
            echo "✓ PR size is reasonable ($total_changes lines changed)"
          fi

  # Require CLAUDE.md update for significant changes
  check-documentation:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if CLAUDE.md needs update
        run: |
          git fetch origin main
          # Check for significant code changes
          code_changes=$(git diff --stat origin/main...HEAD -- '*.go' ':!*_test.go' | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)

          # Check if CLAUDE.md was updated
          claude_md_changed=$(git diff --name-only origin/main...HEAD | grep -c "CLAUDE.md" || echo 0)

          if [ "$code_changes" -gt 200 ] && [ "$claude_md_changed" -eq 0 ]; then
            echo "ℹ️ Significant code changes detected ($code_changes lines)"
            echo "Consider updating CLAUDE.md if architecture or patterns changed"
          fi

  # All PR checks must pass
  pr-ready:
    name: PR Ready
    runs-on: ubuntu-latest
    needs: [check-draft, pr-validation, pr-size, check-documentation]
    if: always()
    steps:
      - name: Check all PR checks
        run: |
          if [[ "${{ needs.check-draft.result }}" == "failure" ]] || \
             [[ "${{ needs.pr-validation.result }}" == "failure" ]]; then
            echo "One or more PR checks failed!"
            exit 1
          fi
          echo "All PR checks passed!"

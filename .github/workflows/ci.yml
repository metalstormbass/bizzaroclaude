name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Build job - verify all packages compile
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build all packages
        run: go build -v ./...

      - name: Build CLI binary
        run: go build -v ./cmd/bizzaroclaude

  # Lint job - static analysis
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  # Unit tests - fast tests for internal packages
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./pkg/...
        env:
          TMUX_TESTS: "1"

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage.out
          retention-days: 7

  # E2E tests - integration tests requiring tmux
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Configure Git
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions"

      - name: Run E2E tests
        run: go test -v ./test/...
        env:
          GITHUB_ACTIONS: true

  # Verify generated documentation is up to date
  verify-docs:
    name: Verify Generated Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Generate documentation
        run: go generate ./pkg/config/...

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code docs/DIRECTORY_STRUCTURE.md || \
          (echo "Error: docs/DIRECTORY_STRUCTURE.md is out of date!" && \
           echo "Run 'go generate ./pkg/config/...' and commit the changes." && \
           echo "" && \
           echo "Diff:" && \
           git diff docs/DIRECTORY_STRUCTURE.md && \
           exit 1)

      - name: Verify extension docs consistency
        run: go run ./cmd/verify-docs

  # Coverage check with thresholds
  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./internal/... ./pkg/...
        env:
          TMUX_TESTS: "1"

      - name: Display coverage summary
        run: |
          echo "==> Total Coverage:"
          go tool cover -func=coverage.out | grep "total:" || echo "No total coverage"
          echo ""
          echo "==> Per-package Coverage:"
          go test -cover ./internal/... ./pkg/... 2>&1 | grep "coverage:" | sort

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-full
          path: coverage.out
          retention-days: 30

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-exclude-generated ./...'
        continue-on-error: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  # Final status check - all jobs must pass
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build, lint, unit-tests, e2e-tests, verify-docs, coverage, security]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]] || \
             [[ "${{ needs.verify-docs.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "One or more CI jobs failed!"
            exit 1
          fi
          echo "All CI jobs passed successfully!"
